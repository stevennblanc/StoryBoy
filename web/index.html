<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#050505">
    <meta name="description" content="StoryBoy web preview for interactive gamebooks.">
    <title>StoryBoy</title>
    <link rel="icon" href="/assets/storyboy-icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/assets/storyboy-icon.svg">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="top-bar">
        <h1 id="screen-title">Library</h1>
        <button id="refresh-button" class="icon-button" type="button" aria-label="Refresh store">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M20 12a8 8 0 1 1-2.4-5.7"/>
            <path d="M18 2.5V7h-4.5"/>
          </svg>
        </button>
      </header>

      <main id="app" class="content" aria-live="polite">
        <p class="muted">Loading StoryBoy...</p>
      </main>

      <nav class="bottom-nav" aria-label="Primary">
        <button class="nav-item active" type="button" data-view="library">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 7c-2-1.4-5-2-9-2v12c4 0 7 .6 9 2 2-1.4 5-2 9-2V5c-4 0-7 .6-9 2z"/>
            <path d="M12 7v12"/>
          </svg>
          <span>Library</span>
        </button>
        <button class="nav-item" type="button" data-view="store">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M6 8h12l1.2 12H4.8L6 8z"/>
            <path d="M9 10V6a3 3 0 0 1 6 0v4"/>
          </svg>
          <span>Store</span>
        </button>
        <button class="nav-item" type="button" data-view="account">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="8" r="3.5"/>
            <path d="M5 20c1-3.5 3.6-5 7-5s6 1.5 7 5"/>
          </svg>
          <span>Account</span>
        </button>
        <button class="nav-item" type="button" data-view="settings">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 7h16M4 12h16M4 17h16"/>
            <circle cx="9" cy="7" r="2" fill="var(--bg, #050505)"/>
            <circle cx="15" cy="12" r="2" fill="var(--bg, #050505)"/>
            <circle cx="7" cy="17" r="2" fill="var(--bg, #050505)"/>
          </svg>
          <span>Settings</span>
        </button>
      </nav>
    </div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
